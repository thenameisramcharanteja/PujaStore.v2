<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | GANESH PUJA SAMAGRI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#FDFBF7] pb-24 md:pb-0 font-sans">

    <main class="max-w-2xl mx-auto p-6 pt-12">
        
        <!-- 1. Login/Signup Screen -->
        <div id="auth-section" class="hidden text-center py-12">
            <div class="w-20 h-20 bg-saffron/10 rounded-3xl flex items-center justify-center mx-auto mb-6 text-saffron shadow-lg">
                <i class="ph-fill ph-user-circle text-5xl"></i>
            </div>
            <h2 class="text-3xl font-premium font-bold text-gray-900 mb-2">Your Spiritual Space</h2>
            <p class="text-gray-500 mb-10 text-sm">Login to track orders and save your wishlist.</p>
            
            <div class="space-y-4 max-w-sm mx-auto">
                <button onclick="handleGoogleSignIn()" class="w-full bg-white text-gray-700 font-bold py-4 rounded-2xl border border-gray-100 hover:bg-gray-50 transition-all flex items-center justify-center gap-3 shadow-xl">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> Continue with Google
                </button>
                <div class="text-xs text-gray-400 py-2">OR USE EMAIL</div>
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-white border border-gray-100 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-saffron/20 shadow-sm">
                <input type="password" id="auth-password" placeholder="Password" class="w-full bg-white border border-gray-100 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-saffron/20 shadow-sm">
                <button onclick="handleLogin()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-gray-800 transition-all">Login</button>
            </div>
        </div>

        <!-- 2. Profile Dashboard -->
        <div id="profile-section" class="hidden">
            <div class="flex items-center justify-between mb-12">
                <div class="flex items-center gap-4">
                    <img id="user-photo" src="" class="w-16 h-16 rounded-2xl border-4 border-white shadow-xl bg-saffron/20">
                    <div>
                        <h1 class="text-2xl font-premium font-bold text-gray-900" id="user-name">...</h1>
                        <p class="text-xs text-gray-400" id="user-email">...</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl border border-gray-100 text-gray-400 hover:text-red-500 shadow-sm transition-all">
                    <i class="ph ph-sign-out text-xl"></i>
                </button>
            </div>

            <!-- Tabs -->
            <div class="flex bg-white p-2 rounded-2xl border border-gray-100 shadow-sm mb-8">
                <button onclick="showTab('orders')" class="tab-btn flex-grow py-3 text-xs font-bold rounded-xl bg-gray-900 text-white shadow-lg transition-all">Orders</button>
                <button onclick="showTab('wishlist')" class="tab-btn flex-grow py-3 text-xs font-bold rounded-xl text-gray-500 hover:bg-gray-50 transition-all">Wishlist</button>
                <button onclick="showTab('address')" class="tab-btn flex-grow py-3 text-xs font-bold rounded-xl text-gray-500 hover:bg-gray-50 transition-all">Address</button>
            </div>

            <!-- List Area -->
            <div id="content-list" class="space-y-3">
                <!-- Data loaded here -->
            </div>
        </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 py-4 flex justify-around z-50">
        <a href="index.html" class="text-gray-400 hover:text-saffron transition-all"><i class="ph ph-house text-2xl"></i></a>
        <a href="cart.html" class="text-gray-400 hover:text-saffron transition-all"><i class="ph ph-shopping-cart text-2xl"></i></a>
        <a href="profile.html" class="text-saffron transition-all"><i class="ph-fill ph-user text-2xl"></i></a>
    </nav>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentUserId = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.auth) return;
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUserId = user.uid;
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('profile-section').classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.displayName || "Devotee";
                    document.getElementById('user-email').innerText = user.email;
                    if(user.photoURL) document.getElementById('user-photo').src = user.photoURL;
                    showTab('orders');
                } else {
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('profile-section').classList.add('hidden');
                }
            });
        });

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-gray-900', 'text-white', 'shadow-lg');
                btn.classList.add('text-gray-500');
            });
            event?.target?.classList.add('bg-gray-900', 'text-white', 'shadow-lg');
            
            if (tab === 'orders') fetchOrders();
            if (tab === 'wishlist') fetchWishlist();
            if (tab === 'address') showAddress();
        }

        async function fetchOrders() {
            const list = document.getElementById('content-list');
            list.innerHTML = '<div class="text-center py-10 opacity-50"><i class="ph ph-spinner animate-spin text-2xl"></i></div>';
            const snap = await db.collection('orders').where('userId', '==', currentUserId).get();
            if(snap.empty) { list.innerHTML = '<p class="text-center py-10 text-gray-400 text-sm">No orders yet.</p>'; return; }
            list.innerHTML = snap.docs.map(doc => {
                const data = doc.data();
                return `
                <div class="bg-white p-5 rounded-2xl border border-gray-50 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-900 text-sm">Order #${doc.id.slice(0,6)}</p>
                        <p class="text-[10px] text-gray-400">Total: ₹${data.total} • ${data.status}</p>
                    </div>
                    <span class="text-[9px] font-black bg-orange-50 text-saffron px-3 py-1 rounded-full uppercase">${data.status}</span>
                </div>`;
            }).join('');
        }

        async function fetchWishlist() {
            const list = document.getElementById('content-list');
            list.innerHTML = '<div class="text-center py-10 opacity-50"><i class="ph ph-spinner animate-spin text-2xl"></i></div>';
            const snap = await db.collection('wishlist').where('userId', '==', currentUserId).get();
            if(snap.empty) { list.innerHTML = '<p class="text-center py-10 text-gray-400 text-sm">Your bucket is empty. 💖</p>'; return; }
            list.innerHTML = snap.docs.map(doc => {
                const data = doc.data();
                return `
                <div class="bg-white p-4 rounded-2xl border border-gray-50 shadow-sm flex items-center gap-4">
                    <img src="${data.image}" class="w-12 h-12 rounded-xl object-cover shadow-sm">
                    <div class="flex-grow">
                        <p class="font-bold text-gray-900 text-sm">${data.name}</p>
                        <p class="text-[10px] text-saffron font-bold">₹${data.price}</p>
                    </div>
                    <button onclick="toggleWishlist('${data.productId}'); fetchWishlist();" class="text-xs font-bold text-red-400 bg-red-50 px-4 py-2 rounded-xl">Remove</button>
                </div>`;
            }).join('');
        }

        function showAddress() {
            document.getElementById('content-list').innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] border border-gray-100 text-center">
                    <i class="ph ph-map-pin text-3xl text-gray-200 mb-4"></i>
                    <p class="text-sm text-gray-500 mb-6">No address saved yet.</p>
                    <button class="bg-gray-900 text-white font-bold px-8 py-3 rounded-2xl shadow-xl">Add New Address</button>
                </div>`;
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } catch(e) { alert(e.message); }
        }

        async function handleGoogleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                    await auth.signInWithRedirect(provider);
                } else {
                    const result = await auth.signInWithPopup(provider);
                    if (window.db) {
                        await window.db.collection('users').doc(result.user.uid).set({
                            name: result.user.displayName,
                            email: result.user.email,
                            uid: result.user.uid,
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    }
                }
            } catch(e) { alert(e.message); }
        }

        function handleLogout() { auth.signOut(); }
    </script>
</body>
</html>

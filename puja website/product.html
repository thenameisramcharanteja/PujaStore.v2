<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | GANESH PUJA SAMAGRI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        saffron: { DEFAULT: '#FF9933', dark: '#E68A2E' },
                        gold: '#D4AF37',
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50 pb-24 md:pb-0">

    <!-- Top Navigation Simple -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-gray-600 p-1 bg-gray-100 rounded-full hover:bg-gray-200">
                    <i class="ph ph-arrow-left text-xl"></i>
                </a>
                <h1 class="font-bold text-gray-900 text-lg line-clamp-1" id="header-title">Product Details</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="#" class="text-gray-600 hover:text-saffron">
                    <i class="ph ph-share-network text-xl"></i>
                </a>
                <a href="cart.html" class="relative text-gray-600 hover:text-saffron">
                    <i class="ph ph-shopping-cart text-xl"></i>
                    <span class="cart-count absolute -top-1.5 -right-2 bg-saffron text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center border-2 border-white" style="display: none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto md:py-6" id="product-container">
        <!-- Rendered via JS -->
        <div class="flex items-center justify-center h-64">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-saffron"></div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function shareProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const title = document.title;
            const url = window.location.href;

            if (navigator.share) {
                try {
                    await navigator.share({ title, url });
                } catch (e) { console.error(e); }
            } else {
                navigator.clipboard.writeText(url);
                showToast("Link copied to clipboard!", "success");
            }
        }

        async function renderComments(productId) {
            const container = document.getElementById('comments-list');
            if (!container || !window.db) return;

            try {
                const snapshot = await db.collection('comments')
                    .where('productId', '==', productId)
                    .orderBy('createdAt', 'desc')
                    .limit(10)
                    .get();

                if (snapshot.empty) {
                    container.innerHTML = '<p class="text-sm text-gray-400 italic">No reviews yet. Be the first! 🙏</p>';
                    return;
                }

                container.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return `
                        <div class="border-b border-gray-100 pb-4">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-bold text-gray-900 text-sm">${data.userName || 'Devotee'}</span>
                                <span class="text-[10px] text-gray-400">${new Date(data.createdAt?.toDate()).toLocaleDateString()}</span>
                            </div>
                            <p class="text-gray-700 text-sm">${data.text}</p>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error("Comments error:", e); }
        }

        async function postComment() {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!text || !currentUser) {
                showToast(currentUser ? "Please type something first!" : "Please login to review.", "error");
                return;
            }

            try {
                await db.collection('comments').add({
                    productId,
                    text,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email.split('@')[0],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
                renderComments(productId);
                showToast("Thank you for your review! 🙏", "success");
            } catch (e) { showToast("Failed to post review.", "error"); }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            let product = null;
            if (window.mockProducts) product = mockProducts.find(p => p.id == productId);
            const container = document.getElementById('product-container');
            
            if (!product && window.db) {
                try {
                    const doc = await db.collection('products').doc(productId).get();
                    if (doc.exists) {
                        product = { id: doc.id, ...doc.data() };
                        window.loadedProducts = window.loadedProducts || [];
                        window.loadedProducts.push(product);
                    }
                } catch(e) { console.error(e); }
            }

            if (!product) {
                container.innerHTML = `<div class="text-center py-20 px-4"><h2 class="text-xl font-bold">Not Found</h2><a href="index.html">Home</a></div>`;
                return;
            }

            document.getElementById('header-title').textContent = product.category;
            document.title = `${product.name} | GANESH PUJA SAMAGRI`;

            container.innerHTML = `
                <div class="md:grid md:grid-cols-2 md:gap-8 md:px-4 bg-white md:rounded-2xl md:shadow-sm md:border md:border-gray-100 overflow-hidden mb-8">
                    <!-- Image Gallery -->
                    <div class="flex flex-col gap-2 bg-gray-50">
                        <!-- Main Image Carousel (Scrollable on mobile) -->
                        <div class="relative w-full aspect-square bg-white overflow-x-auto snap-x snap-mandatory flex no-scrollbar" id="main-carousel">
                            ${(product.images || [product.image]).map((img, i) => `
                                <img src="${img}" class="w-full h-full object-cover flex-shrink-0 snap-center" id="img-slide-${i}">
                            `).join('')}
                        </div>
                        <!-- Thumbnails -->
                        <div class="flex gap-2 p-2 overflow-x-auto no-scrollbar">
                            ${(product.images || [product.image]).map((img, i) => `
                                <img src="${img}" onclick="scrollToSlide(${i}, this)" 
                                     class="thumb-img w-16 h-16 rounded-xl object-cover cursor-pointer border-2 ${i === 0 ? 'border-saffron' : 'border-transparent'} hover:border-saffron/50 transition-all flex-shrink-0 shadow-sm">
                            `).join('')}
                        </div>
                    </div>

                    <div class="p-4 md:p-8 flex flex-col">
                        <div class="text-[10px] font-black text-saffron uppercase tracking-widest mb-2">${product.category}</div>
                        <h1 class="text-2xl md:text-4xl font-premium font-bold text-gray-900 mb-2">${product.name}</h1>
                        <div class="flex items-center gap-4 mb-6">
                            <span class="text-3xl font-black text-gray-900">₹${product.price}</span>
                            <span class="bg-green-100 text-green-700 text-[10px] font-black px-3 py-1 rounded-full">IN STOCK</span>
                        </div>
                        <div class="mb-8">
                            <h3 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-3">Description</h3>
                            <p class="text-gray-600 text-sm leading-relaxed">${product.description}</p>
                        </div>
                        
                        <div class="flex items-center gap-4 mt-auto">
                            <div class="flex items-center bg-gray-50 rounded-2xl border border-gray-100 p-1">
                                <button id="btn-minus" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-gray-900"><i class="ph-bold ph-minus"></i></button>
                                <input type="number" id="qty-input" value="1" min="1" max="10" class="w-10 text-center font-bold bg-transparent outline-none">
                                <button id="btn-plus" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-gray-900"><i class="ph-bold ph-plus"></i></button>
                            </div>
                            <button onclick="handleAdd('${product.id}')" class="flex-grow bg-gray-100 text-gray-900 font-bold h-12 rounded-2xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                                <i class="ph ph-shopping-cart text-lg"></i> Add to Cart
                            </button>
                            <button onclick="handleBuyNow('${product.id}')" class="flex-grow bg-saffron text-white font-bold h-12 rounded-2xl hover:bg-saffron-dark transition-all shadow-lg shadow-saffron/20 flex items-center justify-center gap-2">
                                Buy Now
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Reviews Section -->
                <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm mx-4 md:mx-0 mb-20">
                    <h2 class="font-premium font-bold text-xl text-gray-900 mb-6">Customer Reviews 🙏</h2>
                    
                    <div class="flex flex-col gap-4 mb-8">
                        <textarea id="comment-input" placeholder="Share your experience..." class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 text-sm outline-none focus:border-saffron/30 focus:bg-white transition-all h-24"></textarea>
                        <button onclick="postComment()" class="self-end bg-saffron text-white font-bold px-8 py-3 rounded-xl shadow-lg shadow-saffron/20 active:scale-95 transition-all text-sm">Post Review</button>
                    </div>

                    <div id="comments-list" class="space-y-6">
                        <!-- Rendered via JS -->
                    </div>
                </div>
            `;

            renderComments(productId);

            // Setup Qty buttons
            const qtyInput = document.getElementById('qty-input');
            document.getElementById('btn-minus').addEventListener('click', () => {
                let val = parseInt(qtyInput.value);
                if (val > 1) qtyInput.value = val - 1;
            });
            document.getElementById('btn-plus').addEventListener('click', () => {
                let val = parseInt(qtyInput.value);
                if (val < 10) qtyInput.value = val + 1;
            });
        });

        function scrollToSlide(index, el) {
            const carousel = document.getElementById('main-carousel');
            const slide = document.getElementById(`img-slide-${index}`);
            if (carousel && slide) {
                carousel.scrollTo({ left: slide.offsetLeft, behavior: 'smooth' });
            }
            document.querySelectorAll('.thumb-img').forEach(img => {
                img.classList.remove('border-saffron');
                img.classList.add('border-transparent');
            });
            el.classList.add('border-saffron');
            el.classList.remove('border-transparent');
        }

        function handleAdd(id) {
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            addToCart(id, qty);
        }

        function handleBuyNow(id) {
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            buyNow(id, qty);
        }

        // Connect Share Button
        const shareBtn = document.querySelector('header .ph-share-network')?.parentElement;
        if (shareBtn) shareBtn.onclick = (e) => { e.preventDefault(); shareProduct(); };
    </script>
</body>
</html>

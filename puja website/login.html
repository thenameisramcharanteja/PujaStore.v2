<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GANESH PUJA SAMAGRI</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { saffron: '#FF9933', gold: '#D4AF37' },
                    fontFamily: { sans: ['Inter'], premium: ['Outfit'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">

    <!-- CRITICAL: Firebase Config Linked First -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body class="bg-[#FDFBF7] flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-10 border border-gray-100 fade-in">
        <div class="text-center mb-10">
            <h1 class="font-premium font-bold text-3xl text-gray-900 mb-2">Welcome Back</h1>
            <p class="text-sm text-gray-500">Sign in to your GANESH PUJA SAMAGRI account</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-2">Email</label>
                <input type="email" placeholder="name@example.com" required
                       class="w-full bg-gray-50 border border-gray-200 py-4 px-6 rounded-2xl outline-none focus:border-saffron focus:bg-white transition-all font-bold text-gray-900">
            </div> 

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-2">Password</label>
                <input type="password" placeholder="••••••••" required
                       class="w-full bg-gray-50 border border-gray-200 py-4 px-6 rounded-2xl outline-none focus:border-saffron focus:bg-white transition-all font-bold text-gray-900">
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-5 rounded-[1.5rem] shadow-xl hover:bg-saffron transition-all active:scale-95 flex justify-center items-center gap-3">
                Sign In <i class="ph-bold ph-arrow-right"></i>
            </button>
        </form>

        <div class="relative my-10">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
            <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-black text-gray-400"><span class="bg-white px-4">Or continue with</span></div>
        </div>

        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-4 py-5 rounded-[1.5rem] bg-white border border-gray-200 hover:border-saffron hover:shadow-lg transition-all group">
            <i class="ph-fill ph-google-logo text-2xl text-gray-900"></i>
            <span class="text-sm font-bold text-gray-700">Login with Google</span>
        </button>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-saffron transition-colors">Back to Store</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
